<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>抽烟 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg"/>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/smoking.css" rel="stylesheet"/>
    <script src="js/jquery.js"></script>
    <script src="js/common.js"></script>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav">
            <div class="avatar-mini">
                <img src="icon/user.svg" class="avatar-img" id="topAvatarImg" />
            </div>
            <div class="search-bar">
                <img src="icon/search.svg" class="search-icon" />
                <input type="text" placeholder="搜索记录..." class="search-input" />
            </div>
            <a href="#" class="message-btn">
                <img src="icon/mail.svg" class="message-icon" />
                <span class="notification-dot"></span>
            </a>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Quick Action Module -->
            <section class="quick-action">
                <div class="action-content">
                    <div class="action-info">
                        <h2 class="action-title">快速记录</h2>
                        <p class="action-hint">记录每一次抽烟时刻</p>
                    </div>
                    <button class="smoke-btn">
                        <img src="icon/cigarette.svg" class="btn-icon" />
                        <span>抽一根</span>
                    </button>
                </div>
            </section>

            <!-- Today Overview -->
            <section class="overview-card">
                <div class="card-header">
                    <h2 class="card-title">今日抽烟</h2>
                    <span class="smoke-count" id="todayCount">0 根</span>
                </div>
                <div class="timeline-scroll">
                    <div class="timeline-list" id="todayTimeline">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </section>

            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="stat-card blue compact">
                    <div class="stat-content">
                        <p class="stat-label">上周日均</p>
                        <p class="stat-value" id="lastWeekAvg">0</p>
                    </div>
                </div>
                <div class="stat-card green compact">
                    <div class="stat-content">
                        <p class="stat-label">单日最低</p>
                        <p class="stat-value" id="singleDayMin">0</p>
                    </div>
                </div>
                <div class="stat-card orange compact">
                    <div class="stat-content">
                        <p class="stat-label">昨天</p>
                        <p class="stat-value" id="yesterdayCount">0</p>
                    </div>
                </div>
            </section>

            <!-- Frequency Chart -->
            <section class="chart-card">
                <div class="card-header">
                    <h2 class="card-title">抽烟次数</h2>
                    <div class="chart-tabs">
                        <button class="tab active" data-type="day">日</button>
                        <button class="tab" data-type="week">周</button>
                        <button class="tab" data-type="month">月</button>
                    </div>
                </div>
                <div class="chart-container" id="chartContainer">
                    <!-- 动态加载 -->
                </div>
                <div class="chart-summary">
                    <span class="summary-label">总根数</span>
                    <span class="summary-value" id="chartTotal">0</span>
                </div>
                <a href="smoking-records.html" class="view-detail">查看详情</a>
            </section>

            <!-- Purchase List -->
            <section class="purchase-card">
                <div class="card-header">
                    <h2 class="card-title">购烟明细</h2>
                    <a href="purchase-history.html" class="view-detail simple">更多</a>
                </div>
                <div class="purchase-form">
                    <input type="text" placeholder="品牌" class="purchase-input" id="purchaseBrand" />
                    <input type="text" placeholder="金额" class="purchase-input" id="purchaseAmount" />
                    <button class="add-purchase-btn" id="addPurchaseBtn">
                        <img src="icon/plus.svg" class="add-icon" />
                    </button>
                </div>
                <div class="purchase-list" id="purchaseList">
                    <!-- 动态加载 -->
                </div>
                <div class="purchase-summary">
                    <span class="summary-label">总花费</span>
                    <span class="summary-value" id="purchaseTotal">¥0</span>
                </div>
            </section>
        </main>

        <!-- Toast Notification -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="icon/home.svg" class="nav-icon-bottom" />
                <span class="nav-text">首页</span>
            </a>
            <a href="smoking.html" class="nav-item active">
                <img src="icon/cigarette.svg" class="nav-icon-bottom" />
                <span class="nav-text">抽烟</span>
            </a>
            <a href="daily.html" class="nav-item">
                <img src="icon/calendar.svg" class="nav-icon-bottom" />
                <span class="nav-text">日常</span>
            </a>
            <a href="spending.html" class="nav-item">
                <img src="icon/shopping-bag.svg" class="nav-icon-bottom" />
                <span class="nav-text">消费</span>
            </a>
            <a href="profile.html" class="nav-item">
                <img src="icon/user.svg" class="nav-icon-bottom" />
                <span class="nav-text">我的</span>
            </a>
        </nav>
    </div>

    <script>
        // Toast notification function
        const showToast = function(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2000);
        };

        // 添加购烟记录按钮点击事件
        $('#addPurchaseBtn').on('click', function() {
            var brand = $('#purchaseBrand').val().trim();
            var amount = $('#purchaseAmount').val().trim();
            
            if (!brand) {
                showToast('请输入品牌', 'error');
                $('#purchaseBrand').focus();
                return;
            }
            
            if (!amount) {
                showToast('请输入金额', 'error');
                $('#purchaseAmount').focus();
                return;
            }
            
            if (isNaN(parseFloat(amount))) {
                showToast('请输入有效的金额', 'error');
                $('#purchaseAmount').focus();
                return;
            }
            
            var user = localStorage.getItem('user');
            if (!user) {
                showToast('请先登录', 'error');
                return;
            }
            
            var userData = JSON.parse(user);
            var apiUrl = AppConfig.API_BASE_URL + '/add_purchase_record';
            
            $.ajax({
                url: apiUrl,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    user_id: userData.id,
                    title: brand,
                    price: parseFloat(amount)
                }),
                success: function(response) {
                    if (response.success) {
                        showToast('记录成功！', 'success');
                        $('#purchaseBrand').val('');
                        $('#purchaseAmount').val('');
                        // 刷新购烟明细
                        loadPurchaseRecords();
                    } else {
                        showToast(response.message || '添加失败', 'error');
                    }
                },
                error: function() {
                    showToast('网络错误，请重试', 'error');
                }
            });
        });
        
        // 抽一根按钮点击事件
        $('.smoke-btn').on('click', function() {
            var user = localStorage.getItem('user');
            if (!user) {
                showToast('请先登录', 'error');
                return;
            }
            
            var userData = JSON.parse(user);
            var apiUrl = AppConfig.API_BASE_URL + '/add_smoke_record';
            
            $.ajax({
                url: apiUrl,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    user_id: userData.id
                }),
                success: function(response) {
                    if (response.success) {
                        showToast('记录成功！', 'success');
                        // 刷新数据
                        loadTodayRecords();
                        loadStatistics();
                    } else {
                        showToast(response.message, 'error');
                    }
                },
                error: function() {
                    showToast('网络连接失败', 'error');
                }
            });
        });
        
        // 加载今日记录
        function loadTodayRecords() {
            var user = localStorage.getItem('user');
            if (!user) {
                return;
            }
            
            var userData = JSON.parse(user);
            var apiUrl = AppConfig.API_BASE_URL + '/get_today_smoke_records?user_id=' + userData.id;
            
            $.ajax({
                url: apiUrl,
                type: 'GET',
                success: function(response) {
                    if (response.success) {
                        // 更新数量
                        $('#todayCount').text(response.count + ' 根');
                        
                        // 更新时间线
                        var timelineHtml = '';
                        if (response.records.length > 0) {
                            response.records.forEach(function(record) {
                                var timeStr = record.time_str || '';
                                timelineHtml += '<div class="timeline-item">';
                                timelineHtml += '<span class="time">' + timeStr + '</span>';
                                timelineHtml += '</div>';
                            });
                        } else {
                            timelineHtml = '<div style="text-align: center; color: #999; padding: 20px;">暂无记录</div>';
                        }
                        $('#todayTimeline').html(timelineHtml);
                    }
                },
                error: function() {
                    console.error('加载今日记录失败');
                }
            });
        }
        
        // 加载统计数据
        function loadStatistics() {
            var user = localStorage.getItem('user');
            if (!user) {
                return;
            }
            
            var userData = JSON.parse(user);
            var apiUrl = AppConfig.API_BASE_URL + '/get_smoke_statistics?user_id=' + userData.id;
            
            $.ajax({
                url: apiUrl,
                type: 'GET',
                success: function(response) {
                    if (response.success) {
                        $('#lastWeekAvg').text(response.last_week_avg);
                        $('#singleDayMin').text(response.single_day_min);
                        $('#yesterdayCount').text(response.yesterday_count);
                    }
                },
                error: function() {
                    console.error('加载统计数据失败');
                }
            });
        }
        
        // 页面加载时获取数据
        $(document).ready(function() {
            // 动态加载头像
                        var user = localStorage.getItem('user');
                        if (user) {
                            var userData = JSON.parse(user);
                            var avatarUrl = userData.avatar;
                            if (avatarUrl) {
                                var cleanAvatarUrl = avatarUrl.startsWith('/') ? avatarUrl.substring(1) : avatarUrl;
                                var fullAvatarUrl = avatarUrl.startsWith('http') ? avatarUrl : getStaticBaseUrl() + '/' + cleanAvatarUrl;
                                // 添加时间戳避免缓存
                                fullAvatarUrl += (fullAvatarUrl.indexOf('?') >= 0 ? '&' : '?') + 't=' + new Date().getTime();
                                $('#topAvatarImg').attr('src', fullAvatarUrl);
                                $('#topAvatarImg').removeClass('avatar-icon');
                            }
                        }
            
            loadTodayRecords();
            loadStatistics();
            loadChartData('day');
        });
        
        // 加载图表数据
        function loadChartData(type) {
            var user = localStorage.getItem('user');
            if (!user) {
                return;
            }
            
            var userData = JSON.parse(user);
            var apiUrl = AppConfig.API_BASE_URL + '/get_smoke_chart_data?user_id=' + userData.id + '&type=' + type;
            
            $.ajax({
                url: apiUrl,
                type: 'GET',
                success: function(response) {
                    if (response.success) {
                        // 更新总根数
                        $('#chartTotal').text(response.total);
                        
                        // 渲染图表
                        var html = '';
                        var maxData = Math.max.apply(null, response.data);
                        if (maxData === 0) maxData = 1;
                        
                        var chartHeight = 100; // 图表最大高度（像素）
                        
                        response.labels.forEach(function(label, index) {
                            var value = response.data[index];
                            var height = Math.round((value / maxData) * chartHeight);
                            if (height < 4 && value > 0) height = 4; // 最小高度
                            
                            html += '<div class="bar-wrapper">';
                            html += '<div class="bar" style="height: ' + height + 'px">';
                            html += '<span class="bar-value">' + value + '</span>';
                            html += '</div>';
                            html += '<span class="bar-label">' + label + '</span>';
                            html += '</div>';
                        });
                        
                        if (response.data.length === 0 || response.data.every(v => v === 0)) {
                            html = '<div style="text-align: center; color: #999; padding: 40px; width: 100%;">暂无数据</div>';
                        }
                        
                        $('#chartContainer').html(html);
                    }
                },
                error: function() {
                    console.error('加载图表数据失败');
                }
            });
        }
        
        // Tab切换事件
        $('.chart-tabs .tab').on('click', function() {
            $('.chart-tabs .tab').removeClass('active');
            $(this).addClass('active');
            var type = $(this).data('type');
            loadChartData(type);
        });
        
        // 加载购烟明细
        function loadPurchaseRecords() {
            var user = localStorage.getItem('user');
            if (!user) {
                return;
            }
            
            var userData = JSON.parse(user);
            var apiUrl = AppConfig.API_BASE_URL + '/get_purchase_records?user_id=' + userData.id;
            
            $.ajax({
                url: apiUrl,
                type: 'GET',
                success: function(response) {
                    if (response.success) {
                        var html = '';
                        
                        if (response.records.length === 0) {
                            html = '<div style="text-align: center; color: #999; padding: 30px;">暂无购烟记录</div>';
                        } else {
                            response.records.forEach(function(record) {
                                html += '<div class="purchase-item">';
                                html += '<div class="purchase-icon">';
                                html += '<img src="icon/cigarette.svg" class="item-icon" />';
                                html += '</div>';
                                html += '<div class="purchase-info">';
                                html += '<span class="purchase-brand">' + record.title + '</span>';
                                html += '<span class="purchase-time">' + record.real_time + '</span>';
                                html += '</div>';
                                html += '<span class="purchase-amount">¥' + record.price + '</span>';
                                html += '</div>';
                            });
                        }
                        
                        $('#purchaseList').html(html);
                        $('#purchaseTotal').text('¥' + response.total);
                    }
                },
                error: function() {
                    console.error('加载购烟明细失败');
                }
            });
        }
        
        // 页面加载时获取数据
        $(document).ready(function() {
            loadTodayRecords();
            loadStatistics();
            loadChartData('day');
            loadPurchaseRecords();
        });
    </script>
</body>
</html>
