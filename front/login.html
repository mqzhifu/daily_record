<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>登录 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
    <link href="css/styles.css" rel="stylesheet"/>
</head>
<body class="page-login">
    <div class="decor-bg"></div>
    <div class="decor-bg-bottom"></div>
    
    <div class="container">
        <div class="card">
            <h1 class="title" style="display: none;">登陆</h1>

            <form class="form">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <img src="icon/user.svg" class="input-icon-left" />
                        <input type="text" id="username" placeholder="请输入用户名" />
                    </div>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <img src="icon/lock.svg" class="input-icon-left" />
                        <input type="password" id="password" placeholder="请输入密码" />
                        <img src="icon/visibility.svg" id="toggle-password" class="input-icon-right" />
                    </div>
                </div>

                <a href="forgot_password.html" class="link link-inline" style="text-align: right;">忘记密码？</a>

                <button type="submit" class="btn-primary">
                    <span>登录</span>
                    <img src="icon/arrow_right.svg" class="btn-icon" />
                </button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">或者</span>
                <div class="divider-line"></div>
            </div>

            <div class="social-login">
                <button class="btn-wechat">
                <img src="icon/wechat.svg" class="social-icon" />
                <span>微信</span>
            </button>
            <button class="btn-douyin">
                <img src="icon/douyin.svg" class="social-icon" />
                <span>抖音</span>
            </button>
            </div>

            <p class="link-text-center">
                还没有账号？ <a href="register.html" class="link">立即注册</a>
            </p>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
