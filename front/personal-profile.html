<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>个人资料 - Serene Habits</title>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/personal-profile.css" rel="stylesheet"/>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav-simple">
            <a href="profile.html" class="nav-left">
                <img src="icon/arrow-back.svg" class="nav-icon" />
            </a>
            <h1 class="nav-title">个人资料</h1>
            <div class="nav-right"></div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Info Card -->
            <section class="info-card">
                <div class="list-item">
                    <span class="item-label">昵称</span>
                    <div class="item-right">
                        <span class="item-value">Alex</span>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
                <div class="divider"></div>
                <div class="list-item">
                    <span class="item-label">性别</span>
                    <div class="item-right">
                        <span class="item-value">男</span>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
                <div class="divider"></div>
                <div class="list-item">
                    <span class="item-label">年龄</span>
                    <div class="item-right">
                        <span class="item-value">28 岁</span>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
                <div class="divider"></div>
                <div class="list-item">
                    <span class="item-label">身高</span>
                    <div class="item-right">
                        <span class="item-value">178 cm</span>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
                <div class="divider"></div>
                <div class="list-item">
                    <span class="item-label">体重</span>
                    <div class="item-right">
                        <span class="item-value">72 kg</span>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
                <div class="divider"></div>
                <div class="list-item">
                    <span class="item-label">目标体重</span>
                    <div class="item-right">
                        <span class="item-value">70 kg</span>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
                <div class="divider"></div>
                <div class="list-item">
                    <span class="item-label">运动频率</span>
                    <div class="item-right">
                        <span class="item-value">每周 3-4 次</span>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
            </section>

            <!-- Save Button -->
            <section class="action-section">
                <button class="save-btn">
                    <img src="icon/save.svg" class="save-icon" />
                    <span class="btn-text">保存修改</span>
                </button>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="icon/home.svg" class="nav-icon" />
                <span class="nav-text">首页</span>
            </a>
            <a href="smoking.html" class="nav-item">
                <img src="icon/cigarette.svg" class="nav-icon" />
                <span class="nav-text">戒烟</span>
            </a>
            <a href="daily.html" class="nav-item">
                <img src="icon/calendar.svg" class="nav-icon" />
                <span class="nav-text">日常</span>
            </a>
            <a href="spending.html" class="nav-item">
                <img src="icon/shopping-bag.svg" class="nav-icon" />
                <span class="nav-text">消费</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <img src="icon/user.svg" class="nav-icon" />
                <span class="nav-text">我的</span>
            </a>
        </nav>
    </div>
</body>
</html>
