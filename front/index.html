<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>首页 - Serene Habits</title>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/index.css" rel="stylesheet"/>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav">
            <div class="avatar-mini">
                <img src="icon/user.svg" class="avatar-img" />
            </div>
            <div class="search-bar">
                <div class="search-icon-wrapper">
                    <img src="icon/search.svg" class="search-icon" />
                </div>
                <input type="text" placeholder="搜索记录..." class="search-input" />
            </div>
            <div class="nav-actions">
                <a href="#" class="action-btn">
                    <img src="icon/mail.svg" class="action-icon" />
                </a>
                <a href="#" class="action-btn primary">
                    <img src="icon/plus.svg" class="action-icon" />
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Welcome Card -->
            <section class="welcome-card">
                <h1 class="welcome-title">早上好，Alex</h1>
                <p class="welcome-desc">保持良好习惯，少抽烟，多运动，做健康的自己</p>
            </section>

            <!-- Quick Stats -->
            <section class="quick-stats-card">
                <div class="quick-stats">
                    <div class="quick-stat">
                        <span class="stat-num">15</span>
                        <span class="stat-label">戒烟打卡</span>
                    </div>
                    <div class="quick-stat">
                        <span class="stat-num">22</span>
                        <span class="stat-label">消费打卡</span>
                    </div>
                    <div class="quick-stat">
                        <span class="stat-num">30</span>
                        <span class="stat-label">日常打卡</span>
                    </div>
                </div>
            </section>

            <!-- Recent Activity -->
            <section class="activity-section">
                <div class="section-header">
                    <h2 class="section-title">每日计划</h2>
                </div>
                <div class="activity-list">
                    <div class="activity-card">
                        <div class="activity-icon water">
                            <img src="icon/water.svg" class="icon-img" />
                        </div>
                        <div class="activity-content">
                            <h3 class="activity-title">补充水分</h3>
                            <p class="activity-desc">已喝 6/8 杯</p>
                        </div>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                    <div class="activity-card">
                        <div class="activity-icon breathe">
                            <img src="icon/wind.svg" class="icon-img" />
                        </div>
                        <div class="activity-content">
                            <h3 class="activity-title">跑步运动</h3>
                            <p class="activity-desc">今日未完成</p>
                        </div>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                    <div class="activity-card">
                        <div class="activity-icon checkin">
                            <img src="icon/check-circle.svg" class="icon-img" />
                        </div>
                        <div class="activity-content">
                            <h3 class="activity-title">学习</h3>
                            <p class="activity-desc">今日已完成</p>
                        </div>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                    <div class="activity-card">
                        <div class="activity-icon breathe">
                            <img src="icon/wind.svg" class="icon-img" />
                        </div>
                        <div class="activity-content">
                            <h3 class="activity-title">冥想</h3>
                            <p class="activity-desc">今日未完成</p>
                        </div>
                        <img src="icon/chevron-right.svg" class="arrow-icon" />
                    </div>
                </div>
            </section>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <img src="icon/home.svg" class="nav-icon-bottom" />
                <span class="nav-text">首页</span>
            </a>
            <a href="smoking.html" class="nav-item">
                <img src="icon/cigarette.svg" class="nav-icon-bottom" />
                <span class="nav-text">戒烟</span>
            </a>
            <a href="daily.html" class="nav-item">
                <img src="icon/calendar.svg" class="nav-icon-bottom" />
                <span class="nav-text">日常</span>
            </a>
            <a href="spending.html" class="nav-item">
                <img src="icon/shopping-bag.svg" class="nav-icon-bottom" />
                <span class="nav-text">消费</span>
            </a>
            <a href="profile.html" class="nav-item">
                <img src="icon/user.svg" class="nav-icon-bottom" />
                <span class="nav-text">我的</span>
            </a>
        </nav>
    </div>
</body>
</html>
