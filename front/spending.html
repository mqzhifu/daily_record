                <script>
                    // 加载分类列表
                    function loadCategories() {
                        var apiUrl = AppConfig.API_BASE_URL + '/get_categories?type=1';
                        
                        $.ajax({
                            url: apiUrl,
                            type: 'GET',
                            success: function(response) {
                                if (response.success) {
                                    var html = '';
                                    response.categories.forEach(function(cat) {
                                        html += '<option value="' + cat.id + '">' + cat.name + '</option>';
                                    });
                                    $('#categorySelect').html(html);
                                }
                            },
                            error: function() {
                                $('#categorySelect').html('<option value="">加载失败</option>');
                            }
                        });
                    }
                    
                    // Date Picker Functions
                    const datePickerBtn = document.getElementById('datePickerBtn');
                    const datePickerOverlay = document.getElementById('datePickerOverlay');
                    const modalNow = document.getElementById('modalNow');
                    const modalConfirm = document.getElementById('modalConfirm');
                    const dateSelectValue = datePickerBtn.querySelector('.select-value');

                    // Initialize with current date and time
                    const initCurrentDateTime = function() {
                        const now = new Date();
                        const year = now.getFullYear();
                        const month = String(now.getMonth() + 1).padStart(2, '0');
                        const day = String(now.getDate()).padStart(2, '0');
                        const hour = String(now.getHours()).padStart(2, '0');
                        
                        dateSelectValue.textContent = month + '-' + day + ' ' + hour + ':00';
                        
                        // 设置年份选中项
                        const yearScroll = document.querySelector('#yearScroll');
                        const yearIndex = year - 2024;
                        yearScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === yearIndex);
                        });
                        
                        // 设置月份选中项
                        const monthScroll = document.querySelector('#monthScroll');
                        const monthIndex = now.getMonth();
                        monthScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === monthIndex);
                        });
                        
                        // 设置日期选中项
                        const dayScroll = document.querySelector('#dayScroll');
                        const dayIndex = now.getDate() - 1;
                        dayScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === dayIndex);
                        });
                        
                        // 设置小时选中项
                        const hourScroll = document.querySelector('#hourScroll');
                        const hourIndex = now.getHours();
                        hourScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === hourIndex);
                        });
                        
                        // 滚动到选中项
                        setTimeout(() => {
                            yearScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                            monthScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                            dayScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                            hourScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                        }, 50);
                    };

                    // Run initialization
                    initCurrentDateTime();

                    // Amount input restriction - only allow positive numbers
                    const amountInput = document.querySelector('.amount-input');
                    amountInput.addEventListener('input', function(e) {
                        // Remove any non-digit characters except decimal point
                        let value = this.value.replace(/[^\d.]/g, '');
                        // Only allow one decimal point
                        const parts = value.split('.');
                        if (parts.length > 2) {
                            value = parts[0] + '.' + parts.slice(1).join('');
                        }
                        // Remove leading zeros before decimal
                        if (value.startsWith('0') && value.length > 1 && !value.startsWith('0.')) {
                            value = value.replace(/^0+/, '');
                        }
                        // Remove negative sign
                        value = value.replace(/-/g, '');
                        this.value = value;
                    });

                    datePickerBtn.addEventListener('click', function() {
                        // 每次打开弹窗时都重新初始化当前时间
                        const now = new Date();
                        const year = now.getFullYear();
                        const month = now.getMonth();
                        const day = now.getDate();
                        const hour = now.getHours();
                        
                        dateSelectValue.textContent = String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0') + ' ' + String(hour).padStart(2, '0') + ':00';
                        
                        // 设置年份选中项
                        const yearScroll = document.querySelector('#yearScroll');
                        const yearIndex = year - 2024;
                        yearScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === yearIndex);
                        });
                        
                        // 设置月份选中项
                        const monthScroll = document.querySelector('#monthScroll');
                        monthScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === month);
                        });
                        
                        // 设置日期选中项
                        const dayScroll = document.querySelector('#dayScroll');
                        const dayIndex = day - 1;
                        dayScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === dayIndex);
                        });
                        
                        // 设置小时选中项
                        const hourScroll = document.querySelector('#hourScroll');
                        const hourIndex = hour;
                        hourScroll.querySelectorAll('.picker-item').forEach((item, idx) => {
                            item.classList.toggle('active', idx === hourIndex);
                        });
                        
                        datePickerOverlay.style.display = 'block';
                        document.body.style.overflow = 'hidden';
                        
                        // 滚动到选中项
                        setTimeout(() => {
                            yearScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                            monthScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                            dayScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                            hourScroll.querySelector('.picker-item.active')?.scrollIntoView({ block: 'center', behavior: 'instant' });
                        }, 50);
                    });

                    modalNow.addEventListener('click', function() {
                        const now = new Date();
                        const year = now.getFullYear();
                        const month = now.getMonth() + 1;
                        const day = now.getDate();
                        const hour = now.getHours();
                        
                        document.querySelector('#yearScroll .picker-item.active')?.classList.remove('active');
                        document.querySelector('#yearScroll .picker-item:nth-child(' + (year - 2023) + ')')?.classList.add('active');
                        
                        document.querySelector('#monthScroll .picker-item.active')?.classList.remove('active');
                        document.querySelector('#monthScroll .picker-item:nth-child(' + month + ')')?.classList.add('active');
                        
                        document.querySelector('#dayScroll .picker-item.active')?.classList.remove('active');
                        document.querySelector('#dayScroll .picker-item:nth-child(' + day + ')')?.classList.add('active');
                        
                        document.querySelector('#hourScroll .picker-item.active')?.classList.remove('active');
                        document.querySelector('#hourScroll .picker-item:nth-child(' + (hour + 1) + ')')?.classList.add('active');
                        
                        dateSelectValue.textContent = String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0') + ' ' + String(hour).padStart(2, '0') + ':00';
                        datePickerOverlay.style.display = 'none';
                        document.body.style.overflow = '';
                    });

                    modalConfirm.addEventListener('click', function() {
                        const activeItems = document.querySelectorAll('.picker-item.active');
                        const month = String(Number(activeItems[1].textContent)).padStart(2, '0');
                        const day = String(Number(activeItems[2].textContent)).padStart(2, '0');
                        const hour = String(Number(activeItems[3].textContent)).padStart(2, '0');
                        
                        dateSelectValue.textContent = month + '-' + day + ' ' + hour + ':00';
                        datePickerOverlay.style.display = 'none';
                        document.body.style.overflow = '';
                    });

                    datePickerOverlay.addEventListener('click', function(e) {
                        if (e.target === datePickerOverlay) {
                            datePickerOverlay.style.display = 'none';
                            document.body.style.overflow = '';
                        }
                    });

                    document.querySelectorAll('.picker-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const parentScroll = this.parentElement;
                            parentScroll.querySelectorAll('.picker-item').forEach(i => i.classList.remove('active'));
                            this.classList.add('active');
                        });
                    });

                    // Toast notification function
                    const showToast = function(message, type = 'info') {
                        const toastContainer = document.getElementById('toastContainer');
                        const toast = document.createElement('div');
                        toast.className = `toast ${type}`;
                        toast.textContent = message;
                        toastContainer.appendChild(toast);
                        
                        setTimeout(() => {
                            toast.classList.add('show');
                        }, 10);
                        
                        setTimeout(() => {
                            toast.classList.remove('show');
                            setTimeout(() => {
                                toast.remove();
                            }, 300);
                        }, 2000);
                    };

                    // Add record button click handler with validation
                    const addBtn = document.querySelector('.add-btn');
                    const inputItems = document.querySelectorAll('.input-item');
                    
                    addBtn.addEventListener('click', function() {
                        const name = inputItems[0].value.trim();
                        const amount = inputItems[1].value.trim();
                        const date = dateSelectValue.textContent.trim();
                        const category = document.getElementById('categorySelect').value;
                        
                        if (!name) {
                            showToast('请输入消费名称', 'error');
                            inputItems[0].focus();
                            return;
                        }
                        
                        if (!amount) {
                            showToast('请输入金额', 'error');
                            inputItems[1].focus();
                            return;
                        }
                        
                        // Optional: Validate amount is a number
                        if (isNaN(parseFloat(amount))) {
                            showToast('请输入有效的金额', 'error');
                            inputItems[1].focus();
                            return;
                        }
                        
                        if (!category) {
                            showToast('请选择分类', 'error');
                            return;
                        }
                        
                        if (!date) {
                            showToast('请选择日期', 'error');
                            return;
                        }
                        
                        // 获取用户信息
                        var user = localStorage.getItem('user');
                        if (!user) {
                            showToast('请先登录', 'error');
                            return;
                        }
                        
                        var userData = JSON.parse(user);
                        
                        // 构建real_time格式
                        var realTime = date;
                        // 如果date格式是 "MM-DD HH:00"，需要转换成年份
                        var now = new Date();
                        var year = now.getFullYear();
                        if (date.includes('-') && date.includes(':')) {
                            var parts = date.split(' ');
                            var datePart = parts[0];
                            var timePart = parts[1] || '00:00';
                            realTime = year + '-' + datePart.replace('-', '-') + ' ' + timePart;
                        }
                        
                        // 调用后端API
                var apiUrl = AppConfig.API_BASE_URL + '/add_expense';
                        
                        $.ajax({
                            url: apiUrl,
                            type: 'POST',
                            contentType: 'application/json',
                            data: JSON.stringify({
                                user_id: userData.id,
                                title: name,
                                price: parseFloat(amount),
                                category: parseInt(category),
                                real_time: realTime
                            }),
                            success: function(response) {
                                if (response.success) {
                                    showToast('记录成功！', 'success');
                                    inputItems[0].value = '';
                                    inputItems[1].value = '';
                                    // 刷新今日消费明细
                                    loadTodayExpenses();
                                } else {
                                    showToast(response.message || '添加失败', 'error');
                                }
                            },
                            error: function() {
                                showToast('网络错误，请重试', 'error');
                            }
                        });
                    });
                    
                    // 加载支出构成
                    function loadExpenseBreakdown() {
                        var user = localStorage.getItem('user');
                        if (!user) {
                            console.log('未登录，不加载支出构成');
                            return;
                        }
                        
                        var userData = JSON.parse(user);
                var apiUrl = AppConfig.API_BASE_URL + '/get_expense_breakdown?user_id=' + userData.id;
                        
                        console.log('请求支出构成API:', apiUrl);
                        
                        $.ajax({
                            url: apiUrl,
                            type: 'GET',
                            success: function(response) {
                                console.log('支出构成API响应:', response);
                                if (response.success) {
                                    var breakdown = response.breakdown;
                                    var colors = ['#0058BE', '#3B82F6', '#BFDBFE', '#60A5FA', '#93C5FD'];
                                    var html = '';
                                    
                                    if (breakdown.length === 0) {
                                        // 没有数据时显示提示
                                        html = '<div style="display: flex; align-items: center; gap: 24px;">';
                                        html += '<div class="donut-chart">';
                                        html += '<svg viewBox="0 0 100 100" class="donut-svg">';
                                        html += '<circle cx="50" cy="50" r="40" fill="none" stroke="#EFF6FF" stroke-width="12"/>';
                                        html += '</svg>';
                                        html += '<div class="donut-center">';
                                        html += '<span class="donut-total">¥0</span>';
                                        html += '<span class="donut-label">总计</span>';
                                        html += '</div>';
                                        html += '</div>';
                                        html += '<div class="breakdown-list">';
                                        html += '<div style="color: #999; padding: 20px 0;">暂无消费记录</div>';
                                        html += '</div>';
                                        html += '</div>';
                                    } else {
                                        // 饼图
                                        html += '<div style="display: flex; align-items: center; gap: 24px;">';
                                        html += '<div class="donut-chart">';
                                        html += '<svg viewBox="0 0 100 100" class="donut-svg">';
                                        
                                        var circumference = 2 * Math.PI * 40;
                                        var offset = 0;
                                        
                                        breakdown.forEach(function(item, index) {
                                            var dashLength = (item.percent / 100) * circumference;
                                            var color = colors[index % colors.length];
                                            html += '<circle cx="50" cy="50" r="40" fill="none" stroke="' + color + '" stroke-width="12" ';
                                            html += 'stroke-dasharray="' + dashLength + ' ' + (circumference - dashLength) + '" ';
                                            html += 'stroke-dashoffset="' + (-offset) + '"/>';
                                            offset += dashLength;
                                        });
                                        
                                        html += '</svg>';
                                        html += '<div class="donut-center">';
                                        html += '<span class="donut-total">¥' + response.total + '</span>';
                                        html += '<span class="donut-label">总计</span>';
                                        html += '</div>';
                                        html += '</div>';
                                        
                                        // 分类列表
                                        html += '<div class="breakdown-list">';
                                        breakdown.forEach(function(item, index) {
                                            var color = colors[index % colors.length];
                                            html += '<div class="breakdown-item">';
                                            html += '<span class="category-color" style="background-color: ' + color + '"></span>';
                                            html += '<span class="category-name">' + item.name + '</span>';
                                            html += '<span class="category-percent">' + item.percent + '%</span>';
                                            html += '</div>';
                                        });
                                        html += '</div>';
                                        html += '</div>';
                                    }
                                    
                                    $('#breakdownContent').html(html);
                                } else {
                                    console.error('API返回错误:', response.message);
                                }
                            },
                            error: function(xhr, status, error) {
                                console.error('加载支出构成失败:', status, error);
                                console.error('响应:', xhr.responseText);
                            }
                        });
                    }
                    
                    // 加载今日消费明细
                    function loadTodayExpenses() {
                        var user = localStorage.getItem('user');
                        if (!user) {
                            return;
                        }
                        
                        var userData = JSON.parse(user);
                var apiUrl = AppConfig.API_BASE_URL + '/get_today_expenses?user_id=' + userData.id;
                        
                        $.ajax({
                            url: apiUrl,
                            type: 'GET',
                            success: function(response) {
                                if (response.success) {
                                    var html = '';
                                    
                                    if (response.expenses.length === 0) {
                                        html = '<div style="text-align: center; color: #999; padding: 40px; width: 100%;">暂无消费记录</div>';
                                    } else {
                                        response.expenses.forEach(function(expense) {
                                            html += '<div class="list-item">';
                                            html += '<div class="category-icon food">';
                                            html += '<img src="icon/tag.svg" class="icon-img" />';
                                            html += '</div>';
                                            html += '<div class="item-info">';
                                            html += '<span class="item-name">' + expense.title + '</span>';
                                            html += '<span class="item-time">' + expense.real_time + '</span>';
                                            html += '</div>';
                                            html += '<span class="item-desc">' + expense.category_name + '</span>';
                                            html += '<span class="item-amount">-¥' + expense.price + '</span>';
                                            html += '</div>';
                                        });
                                    }
                                    
                                    $('#todayExpensesList').html(html);
                                    $('#totalCount').text(response.count + ' 笔');
                                    $('#totalAmount').text('-¥' + response.total);
                                }
                            },
                            error: function() {
                                console.error('加载今日消费记录失败');
                            }
                        });
                    }
                    
                    // 加载支出趋势图表数据
                    function loadExpenseChartData(type) {
                        var user = localStorage.getItem('user');
                        if (!user) {
                            return;
                        }
                        
                        var userData = JSON.parse(user);
                var apiUrl = AppConfig.API_BASE_URL + '/get_expense_chart_data?user_id=' + userData.id + '&type=' + type;
                        
                        $.ajax({
                            url: apiUrl,
                            type: 'GET',
                            success: function(response) {
                                if (response.success) {
                                    // 更新总金额
                                    $('#expenseChartTotal').text('¥' + response.total);
                                    
                                    // 渲染图表
                                    var html = '';
                                    var maxData = Math.max.apply(null, response.data);
                                    if (maxData === 0) maxData = 1;
                                    
                                    var chartHeight = 100; // 图表最大高度（像素）
                                    
                                    response.labels.forEach(function(label, index) {
                                        var value = response.data[index];
                                        var height = Math.round((value / maxData) * chartHeight);
                                        if (height < 4 && value > 0) height = 4; // 最小高度
                                        
                                        html += '<div class="bar-wrapper">';
                                        html += '<div class="bar" style="height: ' + height + 'px">';
                                        html += '<span class="bar-value">' + value + '</span>';
                                        html += '</div>';
                                        html += '<span class="bar-label">' + label + '</span>';
                                        html += '</div>';
                                    });
                                    
                                    if (response.labels.length === 0) {
                                        html = '<div style="text-align: center; color: #999; padding: 40px; width: 100%;">暂无数据</div>';
                                    }
                                    
                                    $('#expenseChartContainer').html(html);
                                }
                            },
                            error: function() {
                                console.error('加载支出趋势数据失败');
                            }
                        });
                    }
                    
                    // 页面加载时获取分类、支出构成和今日消费
                    $(document).ready(function() {
                        // 动态加载头像
                        var user = localStorage.getItem('user');
                        if (user) {
                            var userData = JSON.parse(user);
                            var avatarUrl = userData.avatar;
                            if (avatarUrl) {
                                var cleanAvatarUrl = avatarUrl.startsWith('/') ? avatarUrl.substring(1) : avatarUrl;
                                var fullAvatarUrl = avatarUrl.startsWith('http') ? avatarUrl : getStaticBaseUrl() + '/' + cleanAvatarUrl;
                                // 添加时间戳避免缓存
                                fullAvatarUrl += (fullAvatarUrl.indexOf('?') >= 0 ? '&' : '?') + 't=' + new Date().getTime();
                                $('#topAvatarImg').attr('src', fullAvatarUrl);
                            }
                        }
                        
                        loadCategories();
                        loadExpenseBreakdown();
                        loadTodayExpenses();
                        loadExpenseChartData('day');
                        
                        // Tab切换事件
                        $('.chart-tabs .tab').on('click', function() {
                            $('.chart-tabs .tab').removeClass('active');
                            $(this).addClass('active');
                            var type = $(this).data('type');
                            loadExpenseChartData(type);
                        });
                    });
                </script>
            </div>
        </body>
        </html>
