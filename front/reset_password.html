<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>重置密码 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg"/>
    <link href="css/styles.css" rel="stylesheet"/>
</head>
<body>
    <div class="decor-bg"></div>
    <div class="decor-bg-bottom"></div>
    
    <div class="container">
        <div class="card">
            <div class="header">
                <h1 class="title">重置密码</h1>
                <p class="subtitle">设置新密码以恢复您的账号</p>
            </div>

            <form class="form">
                <div class="form-group">
                    <label>新密码</label>
                    <div class="input-wrapper">
                        <img src="icon/lock.svg" class="input-icon-left" />
                        <input type="password" placeholder="请输入新密码" />
                        <img src="icon/visibility.svg" class="input-icon-right" />
                    </div>
                </div>

                <div class="form-group">
                    <label>确认新密码</label>
                    <div class="input-wrapper">
                        <img src="icon/lock.svg" class="input-icon-left" />
                        <input type="password" placeholder="请再次输入密码" />
                        <img src="icon/visibility.svg" class="input-icon-right" />
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <span>确认重置</span>
                    <img src="icon/check.svg" class="btn-icon" />
                </button>
            </form>

            <a href="login.html" class="link link-back">
                <img src="icon/arrow_back.svg" class="link-icon" />
                <span>返回登录</span>
            </a>
        </div>
    </div>
</body>
</html>
