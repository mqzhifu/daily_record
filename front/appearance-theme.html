<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>外观与主题 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg"/>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/appearance-theme.css" rel="stylesheet"/>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav-simple">
            <a href="profile.html" class="nav-left">
                <img src="icon/arrow-back.svg" class="nav-icon" />
            </a>
            <h1 class="nav-title">外观与主题</h1>
            <div class="nav-right"></div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Theme Palette Section -->
            <section class="palette-section">
                <h2 class="section-title">配色方案</h2>
                <div class="palette-grid">
                    <div class="palette-card active">
                        <div class="palette-preview" style="background: linear-gradient(135deg, #0058BE 0%, #3B82F6 100%);">
                            <img src="icon/check-circle.svg" class="check-icon" />
                        </div>
                        <span class="palette-name">冰川蓝</span>
                    </div>
                    <div class="palette-card">
                        <div class="palette-preview" style="background: linear-gradient(135deg, #10B981 0%, #34D399 100%);">
                        </div>
                        <span class="palette-name">薄荷绿</span>
                    </div>
                    <div class="palette-card">
                        <div class="palette-preview" style="background: linear-gradient(135deg, #8B5CF6 0%, #A78BFA 100%);">
                        </div>
                        <span class="palette-name">薰衣草紫</span>
                    </div>
                    <div class="palette-card">
                        <div class="palette-preview" style="background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%);">
                        </div>
                        <span class="palette-name">落日橙</span>
                    </div>
                    <div class="palette-card">
                        <div class="palette-preview" style="background: linear-gradient(135deg, #334155 0%, #64748B 100%);">
                        </div>
                        <span class="palette-name">深岩灰</span>
                    </div>
                    <div class="palette-card">
                        <div class="palette-preview" style="background: linear-gradient(135deg, #F472B6 0%, #F9A8D4 100%);">
                        </div>
                        <span class="palette-name">柔雾粉</span>
                    </div>
                </div>
            </section>

            <!-- Visual Mode Section -->
            <section class="mode-section">
                <h2 class="section-title">视觉模式</h2>
                <div class="mode-options">
                    <div class="mode-option active">
                        <div class="option-left">
                            <div class="option-icon">
                                <img src="icon/sun.svg" class="icon-img" />
                            </div>
                            <div class="option-text">
                                <span class="option-title">浅色模式</span>
                                <span class="option-desc">明亮清爽的界面风格</span>
                            </div>
                        </div>
                        <div class="option-radio active">
                            <img src="icon/check-circle.svg" class="radio-icon" />
                        </div>
                    </div>
                    <div class="mode-option">
                        <div class="option-left">
                            <div class="option-icon dark">
                                <img src="icon/moon.svg" class="icon-img" />
                            </div>
                            <div class="option-text">
                                <span class="option-title">深色模式</span>
                                <span class="option-desc">护眼舒适的夜间体验</span>
                            </div>
                        </div>
                        <div class="option-radio">
                            <img src="icon/circle.svg" class="radio-icon" />
                        </div>
                    </div>
                    <div class="mode-option">
                        <div class="option-left">
                            <div class="option-icon auto">
                                <img src="icon/monitor.svg" class="icon-img" />
                            </div>
                            <div class="option-text">
                                <span class="option-title">自动切换</span>
                                <span class="option-desc">跟随系统自动切换</span>
                            </div>
                        </div>
                        <div class="option-radio">
                            <img src="icon/circle.svg" class="radio-icon" />
                        </div>
                    </div>
                </div>
            </section>

            <!-- Font Size Section -->
            <section class="font-section">
                <h2 class="section-title">字体大小</h2>
                <div class="font-card">
                    <div class="font-preview">
                        <span class="font-small">A</span>
                        <input type="range" min="1" max="4" value="2" class="font-slider" />
                        <span class="font-large">A</span>
                    </div>
                    <div class="font-labels">
                        <span class="font-label">小</span>
                        <span class="font-label">标准</span>
                        <span class="font-label">大</span>
                        <span class="font-label">特大</span>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="icon/home.svg" class="nav-icon" />
                <span class="nav-text">首页</span>
            </a>
            <a href="smoking.html" class="nav-item">
                <img src="icon/cigarette.svg" class="nav-icon" />
                <span class="nav-text">戒烟</span>
            </a>
            <a href="daily.html" class="nav-item">
                <img src="icon/calendar.svg" class="nav-icon" />
                <span class="nav-text">日常</span>
            </a>
            <a href="spending.html" class="nav-item">
                <img src="icon/shopping-bag.svg" class="nav-icon" />
                <span class="nav-text">消费</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <img src="icon/user.svg" class="nav-icon" />
                <span class="nav-text">我的</span>
            </a>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 配色方案切换
            const paletteCards = document.querySelectorAll('.palette-card');
            paletteCards.forEach(card => {
                card.addEventListener('click', function() {
                    // 移除所有卡片的active状态
                    paletteCards.forEach(c => c.classList.remove('active'));
                    // 移除所有卡片内的check-icon
                    paletteCards.forEach(c => {
                        const checkIcon = c.querySelector('.check-icon');
                        if (checkIcon) {
                            checkIcon.remove();
                        }
                    });
                    // 添加当前卡片的active状态
                    this.classList.add('active');
                    // 创建并添加check-icon
                    const palettePreview = this.querySelector('.palette-preview');
                    const checkIcon = document.createElement('img');
                    checkIcon.src = 'icon/check-circle.svg';
                    checkIcon.className = 'check-icon';
                    palettePreview.appendChild(checkIcon);
                });
            });

            // 视觉模式切换
            const modeOptions = document.querySelectorAll('.mode-option');
            const optionRadios = document.querySelectorAll('.option-radio');
            
            modeOptions.forEach((option, index) => {
                option.addEventListener('click', function() {
                    // 移除所有选项的active状态
                    modeOptions.forEach(o => o.classList.remove('active'));
                    optionRadios.forEach(r => r.classList.remove('active'));
                    
                    // 获取所有radio-icon并替换为circle.svg
                    optionRadios.forEach(r => {
                        const radioIcon = r.querySelector('.radio-icon');
                        if (radioIcon) {
                            radioIcon.src = 'icon/circle.svg';
                        }
                    });
                    
                    // 添加当前选项的active状态
                    this.classList.add('active');
                    optionRadios[index].classList.add('active');
                    
                    // 将当前选项的radio-icon改为check-circle.svg
                    const currentRadioIcon = optionRadios[index].querySelector('.radio-icon');
                    if (currentRadioIcon) {
                        currentRadioIcon.src = 'icon/check-circle.svg';
                    }
                });
            });

            // 字体大小滑块
            const fontSlider = document.querySelector('.font-slider');
            if (fontSlider) {
                fontSlider.addEventListener('input', function() {
                    const value = this.value;
                    // 更新滑块背景渐变
                    const percentage = ((value - 1) / 3) * 100;
                    this.style.background = `linear-gradient(to right, #0058BE ${percentage}%, #E2E8F0 ${percentage}%)`;
                });
            }
        });
    </script>
</body>
</html>
