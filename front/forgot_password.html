<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>找回密码 - Serene Habits</title>
    <link href="css/styles.css" rel="stylesheet"/>
</head>
<body>
    <div class="decor-bg"></div>
    <div class="decor-bg-bottom"></div>
    
    <div class="container">
        <div class="card">
            <div class="header">
                <h1 class="title">找回密码</h1>
                <p class="subtitle">输入您的邮箱，我们将发送重置链接</p>
            </div>

            <form class="form">
                <div class="form-group">
                    <label>邮箱</label>
                    <div class="input-wrapper">
                        <img src="icon/mail.svg" class="input-icon-left" />
                        <input type="email" placeholder="请输入邮箱地址" />
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <span>发送重置链接</span>
                    <img src="icon/arrow_right.svg" class="btn-icon" />
                </button>
            </form>

            <a href="login.html" class="link link-back">
                <img src="icon/arrow_back.svg" class="link-icon" />
                <span>返回登录</span>
            </a>
        </div>
    </div>
</body>
</html>
