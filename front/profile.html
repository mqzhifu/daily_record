<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>我的 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg"/>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/styles.css" rel="stylesheet"/>
</head>
<body class="page-profile">
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <a href="#" class="nav-left">
            <img src="icon/menu.svg" class="nav-icon" />
        </a>
        <h1 class="nav-title">我的</h1>
        <a href="#" class="nav-right">
            <img src="icon/settings.svg" class="nav-icon" />
        </a>
    </nav>

    <!-- User Profile Section -->
    <section class="profile-section">
        <div class="avatar-container">
            <div class="avatar" id="avatarDisplay">
                <img src="icon/user.svg" class="avatar-icon" id="avatarImg" />
            </div>
            <button class="edit-btn" id="uploadAvatarBtn">
                <img src="icon/edit.svg" class="edit-icon" />
            </button>
            <input type="file" id="avatarFileInput" accept="image/*" style="display:none;" />
        </div>
        <div class="user-info">
            <h2 class="username" id="profileUsername">Alex</h2>
            <p class="signature">抽烟是一种生活态度</p>
        </div>
    </section>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Avatar Modal -->
    <div class="avatar-modal" id="avatarModal">
        <div class="avatar-modal-content" id="avatarModalContent">
            <img src="icon/user.svg" class="avatar-modal-img" id="avatarModalImg" />
        </div>
    </div>

    <!-- Stats Grid -->
    <section class="stats-section">
        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-value" id="smokingDays">128</p>
                <p class="stat-label">抽烟天数</p>
            </div>
            <div class="stat-card">
                <p class="stat-value" id="totalSpending">3840</p>
                <p class="stat-label">总支出金额</p>
            </div>
            <div class="stat-card">
                <p class="stat-value">156</p>
                <p class="stat-label">总抽烟数</p>
            </div>
        </div>
    </section>

    <!-- Settings Menu -->
    <section class="menu-section">
        <div class="menu-container">
            <a href="personal-profile.html" class="menu-item">
                <div class="menu-icon-wrapper">
                    <img src="icon/user.svg" class="menu-icon" />
                </div>
                <span class="menu-text">个人资料</span>
                <img src="icon/chevron_right.svg" class="menu-arrow" />
            </a>
            <a href="change_password.html" class="menu-item">
                <div class="menu-icon-wrapper">
                    <img src="icon/lock.svg" class="menu-icon" />
                </div>
                <span class="menu-text">修改密码</span>
                <img src="icon/chevron_right.svg" class="menu-arrow" />
            </a>
            <a href="appearance-theme.html" class="menu-item">
                <div class="menu-icon-wrapper">
                    <img src="icon/settings.svg" class="menu-icon" />
                </div>
                <span class="menu-text">外观与主题</span>
                <img src="icon/chevron_right.svg" class="menu-arrow" />
            </a>
            <a href="test.html" class="menu-item">
                <div class="menu-icon-wrapper">
                    <img src="icon/settings.svg" class="menu-icon" />
                </div>
                <span class="menu-text">测试</span>
                <img src="icon/chevron_right.svg" class="menu-arrow" />
            </a>
        </div>
    </section>

    <!-- Logout Button -->
    <section class="logout-section">
        <button class="logout-btn">
            <img src="icon/log_out.svg" class="logout-icon" />
            <span>退出登录</span>
        </button>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <img src="icon/home.svg" class="nav-icon-bottom" />
            <span class="nav-text">首页</span>
        </a>
        <a href="smoking.html" class="nav-item">
            <img src="icon/cigarette.svg" class="nav-icon-bottom" />
            <span class="nav-text">抽烟</span>
        </a>
        <a href="daily.html" class="nav-item">
            <img src="icon/calendar.svg" class="nav-icon-bottom" />
            <span class="nav-text">日常</span>
        </a>
        <a href="spending.html" class="nav-item">
            <img src="icon/shopping-bag.svg" class="nav-icon-bottom" />
            <span class="nav-text">消费</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <img src="icon/user.svg" class="nav-icon-bottom" />
            <span class="nav-text">我的</span>
        </a>
    </nav>
    <script src="js/jquery.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const showToast = function(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2000);
        };
        
        $(document).ready(function() {
            // 确保头像弹窗初始状态为隐藏
            $('#avatarModal').removeClass('open');
            
            // 退出登录按钮点击事件
            $('.logout-btn').on('click', function() {
                // 清除登录状态
                localStorage.removeItem('user');
                localStorage.removeItem('logged_in');
                localStorage.removeItem('login_time');
                
                // 跳转到登录页面
                window.location.href = 'login.html';
            });
            
            // 获取API基础URL（不含/api）
            function getApiBaseUrl() {
                var baseUrl = typeof AppConfig !== 'undefined' 
                    ? AppConfig.API_BASE_URL 
                    : 'http://192.168.3.205:5000/api';
                // 移除末尾的/api（如果有）
                return baseUrl.replace(/\/api\/?$/, '');
            }
            
            // 获取静态资源基础URL（确保没有尾斜杠）
            function getStaticBaseUrl() {
                var baseUrl = typeof AppConfig !== 'undefined' 
                    ? AppConfig.STATIC_BASE_URL 
                    : 'http://192.168.3.205:90';
                // 去除尾斜杠
                return baseUrl.replace(/\/+$/, '');
            }
            
            // 加载用户信息
            var user = localStorage.getItem('user');
            if (user) {
                var userData = JSON.parse(user);
                var username = userData.username || userData.name || '用户';
                $('#profileUsername').text(username);
                
                // 从后端获取最新的用户信息（包含头像）
                if (userData.id) {
                    $.ajax({
                        url: getApiBaseUrl() + '/api/get_user_info',
                        type: 'GET',
                        data: { user_id: userData.id },
                        success: function(response) {
                            if (response.success && response.user) {
                                // 更新localStorage中的用户信息
                                userData.username = response.user.username || userData.username;
                                userData.email = response.user.email || userData.email;
                                userData.avatar = response.user.avatar || userData.avatar;
                                localStorage.setItem('user', JSON.stringify(userData));
                                
                                // 显示用户名
                                var username = userData.username || userData.name || '用户';
                                $('#profileUsername').text(username);
                                
                                // 显示头像
                                var avatarUrl = userData.avatar;
                                if (avatarUrl) {
                                    // 确保不会有双斜杠
                                    var cleanAvatarUrl = avatarUrl.startsWith('/') ? avatarUrl.substring(1) : avatarUrl;
                                    var fullAvatarUrl = avatarUrl.startsWith('http') ? avatarUrl : getStaticBaseUrl() + '/' + cleanAvatarUrl;
                                    // 添加时间戳避免缓存
                                    fullAvatarUrl += (fullAvatarUrl.indexOf('?') >= 0 ? '&' : '?') + 't=' + new Date().getTime();
                                    $('#avatarImg').attr('src', fullAvatarUrl);
                                    $('#avatarModalImg').attr('src', fullAvatarUrl);
                                }
                            }
                        },
                        error: function() {
                            // 如果请求失败，尝试使用localStorage中的数据
                            var avatarUrl = userData.avatar;
                            if (avatarUrl) {
                                // 确保不会有双斜杠
                                var cleanAvatarUrl = avatarUrl.startsWith('/') ? avatarUrl.substring(1) : avatarUrl;
                                var fullAvatarUrl = avatarUrl.startsWith('http') ? avatarUrl : getStaticBaseUrl() + '/' + cleanAvatarUrl;
                                // 添加时间戳避免缓存
                                fullAvatarUrl += (fullAvatarUrl.indexOf('?') >= 0 ? '&' : '?') + 't=' + new Date().getTime();
                                $('#avatarImg').attr('src', fullAvatarUrl);
                                $('#avatarModalImg').attr('src', fullAvatarUrl);
                            }
                        }
                    });
                }
            }
            
            // 点击头像显示大图
            $('#avatarDisplay').on('click', function() {
                var currentSrc = $('#avatarImg').attr('src');
                if (currentSrc) {
                    $('#avatarModalImg').attr('src', currentSrc);
                } else {
                    $('#avatarModalImg').attr('src', 'icon/user.svg');
                }
                $('#avatarModal').addClass('open');
            });
            
            // 点击任何位置关闭大图
            $('#avatarModal').on('click', function() {
                $('#avatarModal').removeClass('open');
            });
            
            // 阻止图片区域点击事件冒泡
            $('#avatarModalContent').on('click', function(e) {
                e.stopPropagation();
            });
            
            // 点击编辑按钮上传图片
            $('#uploadAvatarBtn').on('click', function(e) {
                e.stopPropagation();
                $('#avatarFileInput').click();
            });
            
            // 处理图片上传
            $('#avatarFileInput').on('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                
                var user = localStorage.getItem('user');
                if (!user) {
                    alert('请先登录');
                    return;
                }
                
                var userData = JSON.parse(user);
                var formData = new FormData();
                formData.append('user_id', userData.id);
                formData.append('avatar', file);
                
                // 显示上传中状态
                $('#avatarImg').css('opacity', '0.5');
                
                var apiUrl = getApiBaseUrl() + '/api/upload_avatar';
                console.log('上传到:', apiUrl);
                console.log('用户ID:', userData.id);
                
                $.ajax({
                    url: apiUrl,
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        $('#avatarImg').css('opacity', '1');
                        console.log('上传响应:', response);
                        if (response.success) {
                            // 确保不会有双斜杠
                            var cleanAvatarUrl = response.avatar_url.startsWith('/') ? response.avatar_url.substring(1) : response.avatar_url;
                            var fullAvatarUrl = getStaticBaseUrl() + '/' + cleanAvatarUrl;
                            // 添加时间戳避免缓存
                            fullAvatarUrl += (fullAvatarUrl.indexOf('?') >= 0 ? '&' : '?') + 't=' + new Date().getTime();
                            $('#avatarImg').attr('src', fullAvatarUrl);
                            $('#avatarModalImg').attr('src', fullAvatarUrl);
                            
                            // 更新localStorage中的用户信息
                            userData.avatar = cleanAvatarUrl;
                            localStorage.setItem('user', JSON.stringify(userData));
                            
                            showToast('头像上传成功！', 'success');
                        } else {
                            showToast(response.message || '上传失败', 'error');
                        }
                    },
                    error: function(xhr, status, error) {
                        $('#avatarImg').css('opacity', '1');
                        console.error('上传错误:', xhr, status, error);
                        showToast('上传失败，请重试', 'error');
                    }
                });
                
                // 重置input以便重复上传同一文件
                $(this).val('');
            });
            
            // 加载抽烟统计
            if (user) {
                var userData = JSON.parse(user);
                var apiUrl = getApiBaseUrl() + '/api/get_smoking_stats?user_id=' + userData.id;
                
                $.ajax({
                    url: apiUrl,
                    type: 'GET',
                    success: function(response) {
                        if (response.success) {
                            $('#smokingDays').text(response.smoking_days);
                            $('#totalSpending').text(response.total_spending);
                        }
                    },
                    error: function() {
                        console.log('加载统计失败');
                    }
                });
            }
        });
    </script>
</body>
</html>
