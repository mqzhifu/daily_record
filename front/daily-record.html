<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>日常记录 - Serene Habits</title>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/daily-record.css" rel="stylesheet"/>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav-simple">
            <a href="daily.html" class="nav-left">
                <img src="icon/arrow-back.svg" class="nav-icon" />
            </a>
            <h1 class="nav-title">日常记录</h1>
            <div class="nav-right"></div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search Box -->
            <div class="search-section">
                <input type="text" class="search-input" placeholder="关键字..." />
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active">
                    <span>全部</span>
                </button>
                <button class="filter-btn secondary">
                    <span>全部分类</span>
                </button>
                <button class="filter-btn secondary">
                    <span>日期范围</span>
                </button>
            </div>
            <!-- Date Group 1 -->
            <section class="date-group">
                <div class="date-header">
                    <span class="date-label">2023年11月20日</span>
                    <span class="date-line"></span>
                </div>
                <div class="record-card">
                    <div class="card-header">
                        <span class="col-time">时间</span>
                        <span class="col-detail">记录详情</span>
                        <span class="col-category">分类</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">12:15</span>
                        <span class="cell-detail">晨间冥想</span>
                        <span class="cell-category tag-self">自我提升</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">12:30</span>
                        <span class="cell-detail">营养午餐</span>
                        <span class="cell-category tag-diet">健康饮食</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">15:45</span>
                        <span class="cell-detail">瑜伽练习</span>
                        <span class="cell-category tag-activity">身体活动</span>
                    </div>
                </div>
            </section>

            <!-- Date Group 2 -->
            <section class="date-group">
                <div class="date-header">
                    <span class="date-label">2023年11月19日</span>
                    <span class="date-line"></span>
                </div>
                <div class="record-card">
                    <div class="card-header">
                        <span class="col-time">时间</span>
                        <span class="col-detail">记录详情</span>
                        <span class="col-category">分类</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">08:00</span>
                        <span class="cell-detail">阅读时间</span>
                        <span class="cell-category tag-habit">日常习惯</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">22:00</span>
                        <span class="cell-detail">准时熄灯</span>
                        <span class="cell-category tag-sleep">睡眠质量</span>
                    </div>
                </div>
            </section>

            <!-- Date Group 3 -->
            <section class="date-group">
                <div class="date-header">
                    <span class="date-label">2023年11月18日</span>
                    <span class="date-line"></span>
                </div>
                <div class="record-card">
                    <div class="card-header">
                        <span class="col-time">时间</span>
                        <span class="col-detail">记录详情</span>
                        <span class="col-category">分类</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">07:30</span>
                        <span class="cell-detail">晨间冥想</span>
                        <span class="cell-category tag-self">自我提升</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">18:00</span>
                        <span class="cell-detail">跑步锻炼</span>
                        <span class="cell-category tag-activity">身体活动</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">21:30</span>
                        <span class="cell-detail">阅读学习</span>
                        <span class="cell-category tag-self">自我提升</span>
                    </div>
                    <div class="record-row">
                        <span class="cell-time">22:30</span>
                        <span class="cell-detail">准时熄灯</span>
                        <span class="cell-category tag-sleep">睡眠质量</span>
                    </div>
                </div>
            </section>
        </main>


    </div>
</body>
</html>
