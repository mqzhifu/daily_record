<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>购烟记录 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg"/>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/purchase-history.css" rel="stylesheet"/>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav-simple">
            <a href="smoking.html" class="nav-left">
                <img src="icon/arrow-back.svg" class="nav-icon" />
            </a>
            <h1 class="nav-title">购烟记录</h1>
            <div class="nav-right"></div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="stat-card stat-card-blue">
                    <span class="stat-label">本月购烟</span>
                    <span class="stat-value">5</span>
                    <span class="stat-unit">盒</span>
                </div>
                <div class="stat-card stat-card-orange">
                    <span class="stat-label">累计花费</span>
                    <span class="stat-value">260</span>
                    <span class="stat-unit">元</span>
                </div>
                <div class="stat-card stat-card-green">
                    <span class="stat-label">日均支出</span>
                    <span class="stat-value">8.7</span>
                    <span class="stat-unit">元</span>
                </div>
            </section>

            <!-- History List -->
            <section class="history-section">
                <div class="section-header">
                    <h2 class="section-title">历史明细</h2>
                    <button class="filter-btn">
                        <img src="icon/filter.svg" class="filter-icon" />
                    </button>
                </div>
                
                <div class="history-list">
                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-icon">
                                <img src="icon/package.svg" class="icon-img" />
                            </div>
                            <div class="item-info">
                                <span class="item-brand">中华</span>
                                <span class="item-time">2024-01-15 14:30</span>
                            </div>
                            <div class="item-amount">
                                <span class="amount-value">45</span>
                                <span class="amount-unit">元/盒</span>
                            </div>
                        </div>
                        <div class="item-delete">
                            <img src="icon/trash-2.svg" class="delete-icon" />
                        </div>
                    </div>

                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-icon">
                                <img src="icon/package.svg" class="icon-img" />
                            </div>
                            <div class="item-info">
                                <span class="item-brand">黄鹤楼</span>
                                <span class="item-time">2024-01-12 09:15</span>
                            </div>
                            <div class="item-amount">
                                <span class="amount-value">60</span>
                                <span class="amount-unit">元/盒</span>
                            </div>
                        </div>
                    </div>

                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-icon">
                                <img src="icon/package.svg" class="icon-img" />
                            </div>
                            <div class="item-info">
                                <span class="item-brand">芙蓉王</span>
                                <span class="item-time">2024-01-10 16:45</span>
                            </div>
                            <div class="item-amount">
                                <span class="amount-value">55</span>
                                <span class="amount-unit">元/盒</span>
                            </div>
                        </div>
                    </div>

                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-icon">
                                <img src="icon/package.svg" class="icon-img" />
                            </div>
                            <div class="item-info">
                                <span class="item-brand">玉溪</span>
                                <span class="item-time">2024-01-05 11:20</span>
                            </div>
                            <div class="item-amount">
                                <span class="amount-value">48</span>
                                <span class="amount-unit">元/盒</span>
                            </div>
                        </div>
                    </div>

                    <div class="list-item">
                        <div class="item-content">
                            <div class="item-icon">
                                <img src="icon/package.svg" class="icon-img" />
                            </div>
                            <div class="item-info">
                                <span class="item-brand">利群</span>
                                <span class="item-time">2024-01-02 18:30</span>
                            </div>
                            <div class="item-amount">
                                <span class="amount-value">52</span>
                                <span class="amount-unit">元/盒</span>
                            </div>
                        </div>
                    </div>
                </div>
                <a href="#" class="view-detail">查看更多记录</a>
            </section>
        </main>


    </div>
</body>
</html>
