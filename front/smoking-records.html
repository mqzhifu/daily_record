<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>抽烟记录 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/smoking-records.css" rel="stylesheet"/>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav-simple">
            <a href="smoking.html" class="nav-left">
                <img src="icon/arrow-back.svg" class="nav-icon" />
            </a>
            <h1 class="nav-title">抽烟记录</h1>
            <div class="nav-right"></div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">总根数</span>
                    <span class="stat-value">156</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">总天数</span>
                    <span class="stat-value">28</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">日均</span>
                    <span class="stat-value">5.6</span>
                </div>
            </section>

            <!-- Date Group 1 -->
            <section class="date-group">
                <div class="date-row">
                    <div class="date-left">
                        <span class="date-line"></span>
                        <span class="date-text">1月15日</span>
                    </div>
                    <span class="date-count">4 次</span>
                </div>
                <div class="timeline-list">
                    <div class="timeline-item">
                        <span class="time">08:30</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">12:30</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">16:45</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">20:15</span>

                    </div>
                </div>
            </section>

            <!-- Date Group 2 -->
            <section class="date-group">
                <div class="date-row">
                    <div class="date-left">
                        <span class="date-line"></span>
                        <span class="date-text">1月14日</span>
                    </div>
                    <span class="date-count">5 次</span>
                </div>
                <div class="timeline-list">
                    <div class="timeline-item">
                        <span class="time">07:20</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">10:00</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">13:15</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">17:30</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">21:00</span>

                    </div>
                </div>
            </section>

            <!-- Date Group 3 -->
            <section class="date-group">
                <div class="date-row">
                    <div class="date-left">
                        <span class="date-line"></span>
                        <span class="date-text">1月13日</span>
                    </div>
                    <span class="date-count">4 次</span>
                </div>
                <div class="timeline-list">
                    <div class="timeline-item">
                        <span class="time">08:00</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">11:30</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">14:45</span>

                    </div>
                    <div class="timeline-item">
                        <span class="time">19:20</span>

                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
