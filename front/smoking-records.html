<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>抽烟记录 - Serene Habits</title>
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg"/>
    <link href="css/common.css" rel="stylesheet"/>
    <link href="css/smoking-records.css" rel="stylesheet"/>
</head>
<body>
    <div class="page-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav-simple">
            <a href="smoking.html" class="nav-left">
                <img src="icon/arrow-back.svg" class="nav-icon" />
            </a>
            <h1 class="nav-title">抽烟记录</h1>
            <div class="nav-right"></div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">总根数</span>
                    <span class="stat-value" id="totalRecords">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">总天数</span>
                    <span class="stat-value" id="totalDays">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">日均</span>
                    <span class="stat-value" id="dailyAvg">0</span>
                </div>
            </section>

            <!-- 记录列表 -->
            <div id="recordsContainer">
                <!-- 动态加载 -->
            </div>
        </main>
    </div>
    <script src="js/jquery.js"></script>
    <script src="js/common.js"></script>
    <script>
        // 加载记录列表
        function loadRecordsList() {
            var user = localStorage.getItem('user');
            if (!user) {
                return;
            }
            
            var userData = JSON.parse(user);
            var apiUrl = typeof AppConfig !== 'undefined' 
                ? AppConfig.API_BASE_URL + '/get_smoke_records_list?user_id=' + userData.id 
                : 'http://localhost:5000/api/get_smoke_records_list?user_id=' + userData.id;
            
            $.ajax({
                url: apiUrl,
                type: 'GET',
                success: function(response) {
                    if (response.success) {
                        // 更新统计数据
                        $('#totalRecords').text(response.total_records);
                        $('#totalDays').text(response.total_days);
                        $('#dailyAvg').text(response.daily_avg);
                        
                        // 渲染记录列表
                        var html = '';
                        response.date_groups.forEach(function(group) {
                            // 格式化日期显示
                            var dateObj = new Date(group.date);
                            var month = dateObj.getMonth() + 1;
                            var day = dateObj.getDate();
                            var dateText = month + '月' + day + '日';
                            
                            html += '<section class="date-group">';
                            html += '<div class="date-row">';
                            html += '<div class="date-left">';
                            html += '<span class="date-line"></span>';
                            html += '<span class="date-text">' + dateText + '</span>';
                            html += '</div>';
                            html += '<span class="date-count">' + group.count + ' 次</span>';
                            html += '</div>';
                            html += '<div class="timeline-list">';
                            
                            group.times.forEach(function(time) {
                                html += '<div class="timeline-item">';
                                html += '<span class="time">' + time + '</span>';
                                html += '</div>';
                            });
                            
                            html += '</div>';
                            html += '</section>';
                        });
                        
                        if (response.date_groups.length === 0) {
                            html = '<div style="text-align: center; color: #999; padding: 40px;">暂无记录</div>';
                        }
                        
                        $('#recordsContainer').html(html);
                    }
                },
                error: function() {
                    console.error('加载记录列表失败');
                }
            });
        }
        
        // 页面加载时获取数据
        $(document).ready(function() {
            loadRecordsList();
        });
    </script>
</body>
</html>
